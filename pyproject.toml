[project]
name = "peon"
version = "0.1.0"
description = "Minimal modular Python agent core"
requires-python = ">=3.13"
dependencies = [
    "openpyxl>=3.1,<4",
]

[project.scripts]
report-harness = "report_harness.cli:main"

[dependency-groups]
dev = [
    "mypy>=1.15,<2",
    "pytest>=8,<9",
    "types-openpyxl>=3.1,<4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/peon", "src/report_harness"]
